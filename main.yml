cat << 'EOF' > .github/workflows/main.yml
name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Generate Lightweight Web Container
      run: |
        swift package init --type library
        mkdir -p Sources/RedgifsApp
        cat << 'SWIFT' > Sources/RedgifsApp/App.swift
        import SwiftUI
        import WebKit

        struct WebView: UIViewRepresentable {
            func makeUIView(context: Context) -> WKWebView { WKWebView() }
            func updateUIView(_ uiView: WKWebView, context: Context) {
                if let url = URL(string: "https://www.redgifs.com") {
                    uiView.load(URLRequest(url: url))
                }
            }
        }
        SWIFT

    - name: Compile App Binary
      run: |
        swift build -c release --triple arm64-apple-ios15.0

    - name: Package into IPA Layout
      run: |
        mkdir -p build/Payload/Redgifs.app
        cp -r .build/plugins/ build/Payload/Redgifs.app/ 2>/dev/null || true
        # Package into standard iOS layout structure
        cd build
        zip -r Redgifs-Unsigned.ipa Payload

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Redgifs-Unsigned-IPA
        path: build/Redgifs-Unsigned.ipa
EOF
