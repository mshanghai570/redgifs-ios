name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Create basic Xcode Project Structure
      run: swift package init --type executable

    - name: Build and Archive (Unsigned)
      run: |
        xcodebuild archive \
          -scheme RedgifsWebView \
          -destination 'generic/platform=iOS' \
          -archivePath $PWD/build/Redgifs.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER=""

    - name: Generate Unsigned IPA Package
      run: |
        mkdir -p build/output/Payload
        cp -r build/Redgifs.xcarchive/Products/usr/local/bin/ build/output/Payload/
        cd build/output
        zip -r Redgifs-Unsigned.ipa Payload

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Redgifs-Unsigned-IPA
        path: build/output/Redgifs-Unsigned.ipa
